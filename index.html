<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0b08" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Faculty OS — Tu sistema académico personal inteligente" />
    <title>Faculty OS</title>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('fos-theme');
          var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = saved !== null ? saved : system;
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
